# --- GENERAL SETTINGS ---
set -g default-terminal "screen-256color"
set -g xterm-keys on
set -g mouse on
set -g history-limit 5000
set -g set-clipboard on
set-option -g status-position top

# Prefix: Ctrl + Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Reload config
unbind r
bind r source-file ~/.tmux.conf \; display "Config Reloaded!"

# --- NAVIGATION ---
setw -g mode-keys vi
bind-key L last-window
bind-key -r h select-pane -L
bind-key -r j select-pane -D
bind-key -r k select-pane -U
bind-key -r l select-pane -R

# Open new panes/windows in current directory
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# --- PLUGINS ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Plugin-specific settings
set -g @yank_selection_mouse 'clipboard'

# Initialize TPM (Keep this near the bottom)
run '~/.tmux/plugins/tpm/tpm'

# --- VI-MODE CUSTOMIZATION (Must be AFTER TPM) ---
# This ensures 'v' starts selection and 'y' yanks like Vim.
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "sh -c 'if command -v wl-copy >/dev/null 2>&1; then wl-copy; elif command -v xclip >/dev/null 2>&1; then xclip -selection clipboard -in; else xsel -ib; fi'"
